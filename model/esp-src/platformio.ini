; ── Shared defaults ──────────────────────────────────────────────────────────
[env]
platform              = espressif32
framework             = arduino
monitor_speed         = 115200
board_build.flash_mode  = dio
board_build.flash_size  = 4MB
board_build.partitions  = partitions.csv

; model.c is #included by main.cpp - exclude from direct compilation
build_src_filter      = +<*> -<model.c>

lib_deps =
    mathieucarbou/ESP Async WebServer@^3.0.6
    mathieucarbou/AsyncTCP@^3.1.4

; AsyncTCP_RP2040W targets Raspberry Pi Pico W only - never compile on ESP32
lib_ignore            = AsyncTCP_RP2040W

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -std=gnu++17
    ${sysenv.EXTRA_BUILD_FLAGS}

; ── ESP32-C3 Super Mini ───────────────────────────────────────────────────────
[env:esp32-c3-devkitm-1]
board                 = esp32-c3-devkitm-1
board_build.f_cpu     = 160000000L
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1        ; native USB-CDC (no external UART chip)
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLED_PIN=8                 ; onboard blue LED
    -DLED_ACTIVE_LOW=1          ; LED on = GPIO LOW

; ── ESP32-WROOM-32 ───────────────────────────────────────────────────────────
[env:esp32-wroom-32]
board                 = esp32dev
board_build.f_cpu     = 240000000L
upload_port           = /dev/ttyUSB0
monitor_port          = /dev/ttyUSB0
build_flags =
    ${env.build_flags}
    -DLED_PIN=2                 ; onboard blue LED on devkit
    -DLED_ACTIVE_LOW=0          ; LED on = GPIO HIGH
